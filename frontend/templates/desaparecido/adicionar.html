<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastrar Desaparecido</title>
    <style>
        body { font-family: sans-serif; margin: 20px; }
        .errorlist {
            color: red;
            list-style-type: none;
            padding-left: 0;
            margin-top: -10px;
            margin-bottom: 10px;
            font-size: 0.9em;
        }
        form p { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; }
        input[type="text"], input[type="number"], input[type="date"], textarea, select {
            width: 100%;
            padding: 8px;
            box-sizing: border-box;
            border: 1px solid #ccc;
            border-radius: 4px;
        }
        textarea { min-height: 80px; }
        button[type="submit"] {
            background-color: #4CAF50; color: white; padding: 10px 15px;
            border: none; border-radius: 4px; cursor: pointer;
        }
        button[type="submit"]:hover { background-color: #45a049; }
        .form-field-errors { border-left: 3px solid red; padding-left: 10px; } /* Para destacar campos com erro */
    </style>
</head>
<body>
    <h1>Cadastrar Novo Desaparecido</h1>

    <div style="margin-bottom: 20px; padding: 15px; border: 1px solid #eee; background-color: #f9f9f9; border-radius: 5px;">
        <h3><img src="https://img.icons8.com/ios-filled/20/000000/marker.png" alt="Ícone de Localização" style="vertical-align: middle; margin-right: 5px;"> Buscar Coordenadas por Endereço</h3>
        <p>
            <label for="endereco_completo_busca">Endereço Completo:</label>
            <input type="text" id="endereco_completo_busca" name="endereco_completo_busca" placeholder="Ex: Rua Exemplo, 123, Bairro, Cidade - UF" style="width: calc(100% - 22px);">
        </p>
        <button type="button" onclick="buscarCoordenadasPorEnderecoHandler()" style="background-color: #007bff; color: white; padding: 10px 15px; border: none; border-radius: 4px; cursor: pointer; margin-top:10px;">
            <img src="https://img.icons8.com/ios-glyphs/16/ffffff/search--v1.png" alt="Ícone de Busca" style="vertical-align: middle; margin-right: 5px;"> Buscar Coordenadas
        </button>
        <div id="coordenadas_status_endereco" style="margin-top: 10px; font-style: italic; color: #555;"></div>
    </div>

    <form method="post" enctype="multipart/form-data">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit">Salvar</button>
    </form>
    <br>
    <a href="{% url 'desaparecido:Exibir' %}">Voltar para a lista</a>

    <script>
        const enderecoCompletoBuscaInput = document.getElementById('endereco_completo_busca');
        const coordenadasStatusEnderecoDiv = document.getElementById('coordenadas_status_endereco');

        // Tenta encontrar os campos do formulário Django.
        // Verifique o HTML renderizado para confirmar os IDs corretos.
        const formLatitudeInput = document.getElementById('id_latitude');
        const formLongitudeInput = document.getElementById('id_longitude');
        const formUltimaLocalizacaoInput = document.getElementById('id_ultima_localizacao'); // Campo do seu formulário Django

        async function buscarCoordenadasPorEnderecoHandler() {
            const endereco = enderecoCompletoBuscaInput.value.trim();

            if (!endereco) {
                coordenadasStatusEnderecoDiv.textContent = 'Por favor, digite um endereço para buscar as coordenadas.';
                coordenadasStatusEnderecoDiv.style.color = 'red';
                return;
            }

            coordenadasStatusEnderecoDiv.textContent = `Buscando coordenadas para: ${endereco}...`;
            coordenadasStatusEnderecoDiv.style.color = '#007bff';

            // Preenche o campo "ultima_localizacao" do formulário principal com o endereço digitado
            if (formUltimaLocalizacaoInput) {
                formUltimaLocalizacaoInput.value = endereco;
            }

            const query = encodeURIComponent(endereco);
            try {
                // Usando Nominatim (OpenStreetMap) - Respeite a política de uso: https://operations.osmfoundation.org/policies/nominatim/
                const response = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${query}&limit=1&addressdetails=1`);
                if (!response.ok) throw new Error('Serviço de geocodificação indisponível no momento.');
                const data = await response.json();

                if (data && data.length > 0) {
                    const result = data[0];
                    if (formLatitudeInput) formLatitudeInput.value = parseFloat(result.lat).toFixed(7);
                    if (formLongitudeInput) formLongitudeInput.value = parseFloat(result.lon).toFixed(7);
                    coordenadasStatusEnderecoDiv.textContent = `Coordenadas encontradas: Lat ${result.lat}, Lon ${result.lon}. Verifique e ajuste se necessário.`;
                    coordenadasStatusEnderecoDiv.style.color = 'green';
                } else {
                    throw new Error('Coordenadas não encontradas para o endereço. Por favor, insira manualmente ou tente um endereço mais específico/completo.');
                }
            } catch (error) {
                coordenadasStatusEnderecoDiv.textContent = `Erro: ${error.message}`;
                coordenadasStatusEnderecoDiv.style.color = 'red';
                console.error('Erro Nominatim:', error);
            }
        }
    </script>
</body>
</html>
